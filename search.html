<html lang="zh-CN" data-fui-theme="cyber">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>全站搜索 — WFSpeed.run</title>
<link rel="icon" type="image/png" href="picture/websitelogo.png">
<style>
@font-face{font-family:'Xszt';src:url('fonts/xszt.woff2') format('woff2'),url('fonts/xszt.ttf') format('truetype');font-display:swap;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;font-family:'Xszt','Orbitron',sans-serif;}
@keyframes pgIn{from{opacity:0}to{opacity:1}}
html{font-size:16px;animation:pgIn .75s ease .05s both;}
body{background:#030408;color:#b0cae8;min-height:100vh;overflow-x:hidden;}
a{text-decoration:none;color:inherit;}

#star-cvs{position:fixed;inset:0;z-index:0;pointer-events:none;}
.nebula{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
.nebula::before{content:'';position:absolute;width:80vw;height:80vw;border-radius:50%;
  background:radial-gradient(circle,rgba(0,50,200,.08) 0%,transparent 70%);
  top:-28vw;left:-18vw;animation:nDrift 44s ease-in-out infinite alternate;filter:blur(65px);}
.nebula::after{content:'';position:absolute;width:60vw;height:60vw;border-radius:50%;
  background:radial-gradient(circle,rgba(100,0,200,.07) 0%,transparent 70%);
  bottom:-12vw;right:-12vw;animation:nDrift 36s ease-in-out infinite alternate-reverse;filter:blur(70px);}
@keyframes nDrift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(4vw,-4vw) scale(1.05)}}

/* ══ RAINBOW — hue-rotate is seamless by definition (0°=360°), no background-position seams ══ */
:root{
  --rb:linear-gradient(135deg,
    #ff1a3c 0%,#ff6600 14%,#ffdd00 28%,#33ff88 42%,
    #00ccff 57%,#6633ff 71%,#ff33cc 85%,#ff1a3c 100%);
}
/* main: 5.3s (50% faster) */
@keyframes hs{from{filter:hue-rotate(0deg)}to{filter:hue-rotate(360deg)}}
/* card: 10.7s = 50% of main */
@keyframes hsc{
  from{filter:saturate(.65) brightness(.7) hue-rotate(0deg)}
  to{filter:saturate(.65) brightness(.7) hue-rotate(360deg)}}

/* ── back btn ── */
.back-btn{position:fixed;top:26px;left:28px;z-index:200;display:flex;align-items:center;
  gap:8px;padding:8px 18px;border:1px solid rgba(0,212,255,.22);border-radius:6px;
  background:rgba(0,212,255,.04);color:rgba(0,212,255,.6);font-size:.78rem;
  letter-spacing:.1em;cursor:pointer;transition:color .3s,border-color .3s,box-shadow .3s;}
.back-btn:hover{color:#00d4ff;border-color:rgba(0,212,255,.5);box-shadow:0 0 18px rgba(0,212,255,.2);}
.back-lbl{display:inline-grid;place-items:center;min-width:2.2em;}
.back-lbl .cn,.back-lbl .en{grid-area:1/1;transition:opacity .3s;white-space:nowrap;}
.back-lbl .en{opacity:0;}
.back-btn:hover .cn{opacity:0;}
.back-btn:hover .en{opacity:1;}

/* ── search wrap ── */
.search-wrap{position:fixed;left:50%;top:50%;transform:translate(-50%,-52%);
  display:flex;flex-direction:column;align-items:center;gap:40px;width:100%;z-index:10;
  opacity:0;pointer-events:none;
  transition:top .8s cubic-bezier(.22,.68,0,1.2),transform .8s cubic-bezier(.22,.68,0,1.2),gap .55s ease;}
.search-wrap.ready{opacity:1;pointer-events:auto;
  transition:top .8s cubic-bezier(.22,.68,0,1.2),transform .8s cubic-bezier(.22,.68,0,1.2),
             gap .55s ease,opacity 1s ease;}
.search-wrap.moved{top:88px;transform:translateX(-50%);gap:16px;}
.title-group{display:flex;flex-direction:column;align-items:center;gap:14px;}

/* issue #1: seamless hue-rotate rainbow */
.search-domain{
  font-size:clamp(1rem,2.6vw,1.5rem);letter-spacing:.6em;text-transform:uppercase;white-space:nowrap;
  background:var(--rb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:hs 5.3s linear infinite;
  filter:hue-rotate(0deg); /* initial state for animation */
  text-shadow:none;}
.search-title{
  font-size:clamp(3rem,7vw,5.5rem);font-weight:700;letter-spacing:.16em;
  text-align:center;white-space:nowrap;
  background:var(--rb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:hs 5.3s linear infinite;}

/* search box: gradient border via padding + inner cover; hue-rotate on outer (inner is near-black so unaffected) */
.search-box-outer{width:60%;border-radius:999px;padding:2px;
  background:var(--rb);
  animation:hs 5.3s linear infinite;
  box-shadow:0 0 28px rgba(0,180,255,.15),0 0 55px rgba(130,60,255,.08);}
.search-box-inner{display:flex;align-items:center;background:#06070c;
  border-radius:999px;padding:0 16px 0 28px;height:60px;gap:8px;}
.search-input{flex:1;background:none;border:none;outline:none;font-size:1rem;
  letter-spacing:.06em;color:#e8f4ff;caret-color:#00d4ff;}
.search-input::placeholder{color:rgba(0,212,255,.28);}
.search-icon-btn{background:none;border:none;cursor:pointer;color:rgba(0,212,255,.6);
  display:flex;align-items:center;justify-content:center;width:40px;height:40px;
  border-radius:50%;flex-shrink:0;transition:color .25s,background .25s,box-shadow .25s;}
.search-icon-btn:hover{color:#00d4ff;background:rgba(0,212,255,.1);box-shadow:0 0 14px rgba(0,212,255,.4);}

/* ── results ── */
.results-area{position:fixed;left:50%;transform:translateX(-50%);width:60%;
  top:314px;bottom:0;overflow-y:auto;padding:0 0 calc(80px + env(safe-area-inset-bottom,20px));
  display:flex;flex-direction:column;gap:14px;z-index:10;
  opacity:0;pointer-events:none;transition:opacity .5s ease;
  scrollbar-width:thin;scrollbar-color:rgba(0,212,255,.18) transparent;}
.results-area.visible{opacity:1;pointer-events:auto;}
.results-area::-webkit-scrollbar{width:4px;}
.results-area::-webkit-scrollbar-thumb{background:rgba(0,212,255,.18);border-radius:2px;}

.result-card{position:relative;border-radius:16px;cursor:pointer;isolation:isolate;
  transform:translateY(32px);opacity:0;animation:cardSlide .52s cubic-bezier(.22,.68,0,1.2) forwards;}
@keyframes cardSlide{to{transform:translateY(0);opacity:1;}}

/* issue #2: card border — dimmer rainbow, 50% speed */
.result-card::before{content:'';position:absolute;inset:0;border-radius:16px;padding:1.6px;
  background:var(--rb);
  animation:hsc 10.7s linear infinite;
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;z-index:-1;}
.result-inner{background:rgba(6,8,18,.95);border-radius:15px;overflow:hidden;transition:background .3s;}
.result-card:hover .result-inner,.result-card.kbsel .result-inner{background:rgba(0,160,255,.07);}
.result-card.kbsel{box-shadow:0 0 0 1.5px rgba(0,212,255,.55),0 0 22px rgba(0,160,255,.25);}

/* card head — issue #6 sizes */
.card-head{padding:15px 24px;border-bottom:1px solid rgba(0,212,255,.09);}
.card-title-row{display:flex;align-items:baseline;gap:16px;flex-wrap:wrap;}
/* issue #2: card title — dimmer rainbow, 50% speed */
.card-page-title-cn{
  font-size:1.12rem;font-weight:700;letter-spacing:.07em;
  background:var(--rb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:hsc 10.7s linear infinite;white-space:nowrap;}
.card-page-title-en{font-size:.82rem;letter-spacing:.08em;color:rgba(176,202,232,.3);white-space:nowrap;}
.card-ctx{font-size:.92rem;letter-spacing:.05em;color:rgba(0,212,255,.58);margin-top:5px;}
.card-rows{display:flex;flex-direction:column;}
.card-row{display:grid;grid-template-columns:3em 1fr 2.2fr 6.5em;
  padding:10px 24px;font-size:.94rem;letter-spacing:.04em;color:#b0cae8;
  border-bottom:1px solid rgba(0,212,255,.04);transition:opacity .3s;}
.card-row:last-child{border-bottom:none;}
.card-row.dim{opacity:.2;}
.card-rank{color:rgba(0,212,255,.4);font-size:.8rem;align-self:center;}
.card-time{color:#00ffcc;font-weight:700;}
.card-player{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#e8f4ff;}
.card-date{color:rgba(176,202,232,.4);font-size:.78rem;text-align:right;}
.card-status{color:rgba(0,212,255,.65);font-size:.86rem;}
.card-empty{padding:12px 24px;font-size:.9rem;color:rgba(176,202,232,.3);text-align:center;}
.no-results{text-align:center;padding:60px 0 20px;color:rgba(176,202,232,.35);

.search-loading{text-align:center;padding:60px 0 20px;color:rgba(0,212,255,.55);
  font-size:.92rem;letter-spacing:.18em;animation:loadPulse 1.4s ease-in-out infinite;}
@keyframes loadPulse{0%,100%{opacity:.25}50%{opacity:1}}

@media(max-width:900px){.search-box-outer,.results-area{width:90%;}.search-domain{letter-spacing:.3em;}}

<!-- ══ STAR FIELD ══ -->
<script>
(function(){
  var c=document.getElementById('star-cvs'),ctx=c.getContext('2d'),S=[];
  function resize(){c.width=innerWidth;c.height=innerHeight;S=[];
    for(var i=0;i<360;i++){var r=Math.random();
      var col=r<.52?'255,255,255':r<.74?'180,215,255':r<.88?'255,220,160':'0,200,255';
      S.push({x:Math.random()*c.width,y:Math.random()*c.height,sz:Math.random()*1.7+.2,
        base:Math.random()*.5+.15,sp:Math.random()*.018+.003,ph:Math.random()*6.28,col:col});}}
  function tick(){var t=performance.now()*.001;
    ctx.fillStyle='#030408';ctx.fillRect(0,0,c.width,c.height);
    S.forEach(function(s){var a=s.base*(.68+.32*Math.sin(t*s.sp*55+s.ph));
      ctx.save();ctx.globalAlpha=a;ctx.fillStyle='rgba('+s.col+',1)';
      ctx.beginPath();ctx.arc(s.x,s.y,s.sz,0,6.28);ctx.fill();ctx.restore();});
    requestAnimationFrame(tick);}
  window.addEventListener('resize',resize);resize();tick();
})();
</script>

<script>
var _loaded=false,_loading=false,_cbs=[];
function loadData(cb){
  if(_loaded){cb();return;}
  _cbs.push(cb);if(_loading)return;_loading=true;
  /* 性能优化：原本逐个加载 317 个数据文件（317 次 HTTP 请求，大陆访问 GitHub Pages
     极慢甚至超时），现改为加载 20 个按分类目录预拼接好的 _bundle.js（由
     .github/scripts/bundle_data.py 在每次 data/ 改动 push 后自动重建）。
     每个 bundle 内含该分类所有节点的全局变量，IDX 按变量名查表逻辑完全不变。 */
  var f=[
    'data/arbitration/_bundle.js','data/assassination/_bundle.js','data/cambire/_bundle.js',
    'data/capture/_bundle.js','data/defection/_bundle.js','data/defense-relic/_bundle.js',
    'data/disruption/_bundle.js','data/eidolon/_bundle.js','data/eidolon-macro/_bundle.js',
    'data/exterminate/_bundle.js','data/hollvania/_bundle.js','data/profit-taker/_bundle.js',
    'data/profit-taker-macro/_bundle.js','data/rescue/_bundle.js','data/ropalolyst/_bundle.js',
    'data/sabotage/_bundle.js','data/skirmish/_bundle.js','data/special-events/_bundle.js',
    'data/special_challenge/_bundle.js','data/spy/_bundle.js'
  ];
  var bi=0,BATCH=40;
  function nb(){
    if(bi*BATCH>=f.length){_loaded=true;_loading=false;_cbs.forEach(function(c){c();});_cbs=[];return;}
    var batch=f.slice(bi*BATCH,(bi+1)*BATCH);bi++;var done=0;
    batch.forEach(function(src){var s=document.createElement('script');s.src=src;
      s.onload=s.onerror=function(){if(++done===batch.length)nb();};document.head.appendChild(s);});}
  nb();
}
</script>

<!-- ══ SEARCH ENGINE + EXIT TUNNEL + UI ══ -->
<script src="js/pinyin-search.js"></script>
<script>if (window.PYS) PYS.load('data/pinyin-map.json');</script>
<script>
function getRecs(n){
  try{var r=window[n];if(Array.isArray(r))return r;}catch(e){}
  try{var r=(0,eval)(n);if(Array.isArray(r))return r;}catch(e){}
  return null;}

function _parseTimeMs(s){
  if(!s)return Infinity;
  var p=s.split(':'),ms=0;
  if(p.length===3)ms=(parseInt(p[0],10)*3600+parseInt(p[1],10)*60+parseFloat(p[2]))*1000;
  else if(p.length===2)ms=(parseInt(p[0],10)*60+parseFloat(p[1]))*1000;
  else ms=parseFloat(p[0])*1000;
  return isNaN(ms)?Infinity:ms;}
function _sortedRecs(arr){
  if(!arr||!arr.length)return arr;
  var f=arr[0].clearTime!=null?'clearTime':arr[0].avgRealTime!=null?'avgRealTime':null;
  if(!f)return arr;
  return arr.slice().sort(function(a,b){return _parseTimeMs(a[f])-_parseTimeMs(b[f]);});
}

/* 从记录对象提取所有可搜索字符串（含 avgRealTime、captureStatus 等特殊字段） */
function recStr(r){
  return Object.values(r).map(function(v){
    if(typeof v==='string') return v;
    if(Array.isArray(v)) return ''; /* 跳过 videoUrls 数组 */
    return '';
  }).join(' ');
}

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];});}

/* 将查询字符串拆分为词列表（按空格，过滤空串，全部小写） */
function parseWords(q){return q.toLowerCase().split(/\s+/).filter(Boolean);}

/* 单个词命中：精确子串 优先；拉丁词再试拼音(全拼/首字母，py 为该榜单中文名的拼音blob)；
   ≥3 字符再试模糊(子序列容错)。py 由调用方按 IDX 条目预算好传入。 */
function wordHit(w,text,py){
  if(text.indexOf(w)!==-1)return true;
  if(py&&/^[a-z0-9]+$/.test(w)&&py.indexOf(w)!==-1)return true;
  if(w.length>=3&&window.PYS&&PYS.subseq(text,w))return true;
  return false;
}
/* 判断 words 中每个词是否都命中 text（含拼音/模糊兜底）；py 可选(中文名拼音blob) */
function allMatch(words,text,py){var t=text.toLowerCase();return words.every(function(w){return wordHit(w,t,py);});}
/* 取(并缓存)某榜单条目中文名的拼音blob：全拼 + 空格 + 首字母 */
function entryPy(e){
  if(e._py===undefined){
    var k=window.PYS?PYS.keys((e.titleCn||'')+(e.ctx||'')):{full:'',init:''};
    e._py=k.full+' '+k.init;
  }
  return e._py;
}

function runSearch(raw){
  var q=raw.trim();if(!q)return[];
  var words=parseWords(q);
  if(!words.length)return[];
  var res=[],seen=new Set();

  IDX.forEach(function(e){
    var recs=_sortedRecs(getRecs(e.varName));if(!Array.isArray(recs))return;
    /* 榜单维度的可搜字符串（标题+语言+子分类名） */
    var titleStr=[e.titleCn,e.titleEn,e.ctx,e.ctxEn].join(' ');

    /* ── 判断是否"纯标题命中"：所有词都命中 titleStr(含拼音/模糊兜底) ── */
    if(allMatch(words,titleStr,entryPy(e))){
      var k='T|'+e.varName;if(seen.has(k))return;seen.add(k);
      res.push({page:e.page,titleCn:e.titleCn,titleEn:e.titleEn,ctx:e.ctx,ctxEn:e.ctxEn,
        rows:recs.slice(0,3),matchIdx:-2,startRank:0,recCount:recs.length});
      return;}

    /* ── 逐条数据检索：每个词必须出现在"榜单字符串 + 本行数据字符串"的联合文本中 ──
       这样 "Nameless Kappa 单人"、"less 中断 solo" 等跨维度搜索都能命中 */
    recs.forEach(function(rec,idx){
      var rowStr=recStr(rec);
      var combined=titleStr+' '+rowStr;
      if(!allMatch(words,combined,entryPy(e)))return;
      var k='D|'+e.varName+'|'+idx;if(seen.has(k))return;seen.add(k);
      var n=recs.length,start,mpos;
      if(idx===0){start=0;mpos=0;}
      else if(idx>=n-1){start=Math.max(0,n-3);mpos=idx-start;}
      else{start=idx-1;mpos=1;}
      res.push({page:e.page,titleCn:e.titleCn,titleEn:e.titleEn,ctx:e.ctx,ctxEn:e.ctxEn,
        rows:recs.slice(start,start+3),matchIdx:mpos,startRank:start||0,recCount:recs.length});
    });
  });

  /* 按榜单数据条目数从多到少排列 */
  res.sort(function(a,b){return b.recCount-a.recCount;});
  return res;
}

/* ── exit: 先整体缩小到中心，再 CRT 关机效果 ── */
var _navigating=false;
function playExitCollapse(dest){
  if(_navigating)return;_navigating=true;

  /* 问题D-fix: 原注释"1.8s"与实际值不符；动画约 1.53s，此处保守设 10s 防异常卡死 */
  /* 安全回退：动画异常时约 10s 后强制导航 */
  var _exitFallback=setTimeout(function(){
    try{document.documentElement.style.cssText='';}catch(e){}
    _navigating=false;
    window.location.href=dest;
  },10000);

  try{
  /* 第一步：页面整体缩小到中心（~480ms） */
  var de=document.documentElement;
  de.style.overflow='hidden';
  de.style.transformOrigin='50% 50%';
  de.style.transition='transform .45s cubic-bezier(.55,0,1,.6),opacity .3s ease .12s';
  de.style.transform='scale(0.04)';
  de.style.opacity='0';

  /* 第二步：缩小结束后叠加 CRT Canvas 效果 */
  setTimeout(function(){
    /* 重置 DOM 变换（canvas 接管画面） */
    de.style.transition='none';
    de.style.transform='';
    de.style.opacity='';
    de.style.overflow='';

    var ov=document.createElement('canvas');
    ov.style.cssText='position:fixed;inset:0;z-index:9999;pointer-events:all;background:#03050e;';
    ov.width=innerWidth; ov.height=innerHeight;
    document.body.appendChild(ov);
    var ctx=ov.getContext('2d');
    var W=ov.width,H=ov.height,cy=H/2;
    var DUR=1050,t0=null;

    function frame(now){
      if(!t0)t0=now;
      var el=now-t0,p=Math.min(el/DUR,1);

      /* Phase A (0→0.40): 全黑底 + 白色横条从全屏高度压缩至细线 */
      if(p<0.40){
        ctx.fillStyle='rgb(3,5,14)';
        ctx.fillRect(0,0,W,H);
        var bp=p/0.40;
        var barH=Math.max(0,H*(1-bp)*0.5); /* 半高→0 */
        if(barH>0.5){
          /* 辉光 */
          var grd=ctx.createLinearGradient(0,cy-barH*1.5,0,cy+barH*1.5);
          grd.addColorStop(0,'rgba(255,255,255,0)');
          grd.addColorStop(0.3,'rgba(180,225,255,'+(0.3*(1-bp))+')');
          grd.addColorStop(0.5,'rgba(255,255,255,'+(0.9-bp*0.2)+')');
          grd.addColorStop(0.7,'rgba(180,225,255,'+(0.3*(1-bp))+')');
          grd.addColorStop(1,'rgba(255,255,255,0)');
          ctx.fillStyle=grd;
          ctx.fillRect(0,cy-barH*1.5,W,barH*3);
          /* 实心白条 */
          ctx.fillStyle='rgba(255,255,255,'+(0.96-bp*0.1)+')';
          ctx.fillRect(0,cy-barH,W,barH*2);
        }
      }
      /* Phase B (0.40→0.78): 细白线收尾（CRT 尾光） */
      else if(p<0.78){
        ctx.fillStyle='rgb(3,5,14)';
        ctx.fillRect(0,0,W,H);
        var lp=(p-0.40)/0.38;
        var la=Math.pow(1-lp,1.8);
        if(la>0.004){
          var lg=ctx.createLinearGradient(0,cy-30,0,cy+30);
          lg.addColorStop(0,'rgba(255,255,255,0)');
          lg.addColorStop(0.5,'rgba(220,240,255,'+(la*0.6)+')');
          lg.addColorStop(1,'rgba(255,255,255,0)');
          ctx.fillStyle=lg; ctx.fillRect(0,cy-30,W,60);
          ctx.fillStyle='rgba(255,255,255,'+la+')';
          ctx.fillRect(0,cy-1,W,2);
        }
      }
      /* Phase C (0.78→1.0): 纯黑 */
      else{
        ctx.fillStyle='rgb(3,5,14)';
        ctx.fillRect(0,0,W,H);
      }

      if(el<DUR)requestAnimationFrame(frame);
      else window.location.href=dest;
    }
    requestAnimationFrame(frame);
  }, 480);
  }catch(err){clearTimeout(_exitFallback);_navigating=false;window.location.href=dest;}
}

/* ── render ── */
function renderResults(results){
  var area=document.getElementById('results-area');
  _kbIdx=-1;
  area.classList.remove('visible');area.innerHTML='';area.offsetHeight;
  if(!results||results.length===0){
    /* 全站榜单里查无此项时，给一个去"物品检索"的出口——用户搜的也许是物品名，
       那属于 item.html 的领域；两个搜索互相兜底，不让用户走进死胡同。 */
    var qx=encodeURIComponent(_lastTerm||'');
    area.innerHTML='<div class="no-results">· 未找到相关榜单 ·<br><span style="font-size:.8rem">No leaderboard match</span>'+
      '<div style="margin-top:18px"><a href="item.html?q='+qx+'" style="display:inline-block;padding:9px 18px;border-radius:8px;'+
      'border:1px solid rgba(0,212,255,.4);color:rgba(120,210,255,.9);text-decoration:none;font-size:.82rem;letter-spacing:.05em;">'+
      '也许在找物品？前往物品检索 →</a></div></div>';
    area.classList.add('visible');return;}
  /* 结果数量提示 */
  var countDiv=document.createElement('div');
  countDiv.style.cssText='text-align:center;font-size:.74rem;letter-spacing:.14em;color:rgba(0,212,255,.42);padding:4px 0 2px;';
  countDiv.textContent='找到 '+results.length+' 条相关榜单数据';
  area.appendChild(countDiv);
  var frag=document.createDocumentFragment(),delay=0;
  results.forEach(function(r){
    var card=document.createElement('div');
    card.className='result-card';card.style.animationDelay=delay+'s';delay+=0.05;
    card.dataset.dest=r.page;
    var ctxStr=r.ctx?(r.ctx+(r.ctxEn?' / '+r.ctxEn:'')):'';
    var inner='<div class="result-inner"><div class="card-head">'+
      '<div class="card-title-row">'+
      '<span class="card-page-title-cn">'+esc(r.titleCn)+'</span>'+
      '<span class="card-page-title-en">'+esc(r.titleEn)+'</span>'+
      '</div>'+(ctxStr?'<div class="card-ctx">'+esc(ctxStr)+'</div>':'')+
      '</div><div class="card-rows">';
    if(r.rows.length===0){inner+='<div class="card-empty">暂无记录 / No records</div>';}
    else{r.rows.forEach(function(rec,ri){
      var dim=(r.matchIdx===-2)||(r.matchIdx>=0&&ri!==r.matchIdx);
      var time=rec.clearTime||rec.avgRealTime||'—';
      var player=rec.playerId||'—';var date=rec.uploadTime||'—';
      if(rec.captureStatus){
        inner+='<div class="card-row'+(dim?' dim':'')+'">'+
          '<span class="card-rank">#'+(r.startRank+ri+1)+'</span>'+
          '<span class="card-time">'+esc(time)+'</span>'+
          '<span class="card-status">'+esc(rec.captureStatus)+'</span>'+
          '<span class="card-player">'+esc(player)+'</span></div>';
      }else{
        inner+='<div class="card-row'+(dim?' dim':'')+'">'+
          '<span class="card-rank">#'+(r.startRank+ri+1)+'</span>'+
          '<span class="card-time">'+esc(time)+'</span>'+
          '<span class="card-player">'+esc(player)+'</span>'+
          '<span class="card-date">'+esc(date)+'</span></div>';}});}
    inner+='</div></div>';card.innerHTML=inner;
    card.addEventListener('click',function(){playExitCollapse(card.dataset.dest);});
    frag.appendChild(card);});
  area.appendChild(frag);area.classList.add('visible');}

/* ── UI — issue #4: loading displays for random 2.5–5s ── */
var wrap=document.getElementById('search-wrap');
var inp=document.getElementById('search-input');
var movedUp=false;

window.addEventListener('resize',function(){
  if(movedUp){var box=document.querySelector('.search-box-outer');
    if(box)document.getElementById('results-area').style.top=(box.getBoundingClientRect().bottom+14)+'px';}
});
function _updateResultsTop(){
  var box=document.querySelector('.search-box-outer');
  if(box){var t=box.getBoundingClientRect().bottom+14;
    if(t>60)document.getElementById('results-area').style.top=t+'px';}
}

var _lastTerm='';
function doSearch(){
  var term=inp.value.trim();if(!term)return;
  _lastTerm=term;
  var area=document.getElementById('results-area');
  var minMs=2500+Math.random()*2500;
  var dataReady=false,timerReady=false,pendingRes=null;
  function tryShow(){if(dataReady&&timerReady){renderResults(pendingRes);inp.focus();}}

  if(!movedUp){
    movedUp=true;wrap.classList.add('moved');
    /* 首次搜索：等动画稳定后再显示加载提示，避免位置跳变 */
    area.classList.remove('visible');area.innerHTML='';
    setTimeout(function(){
      _updateResultsTop();
      area.innerHTML='<div class="search-loading">正在搜索全站数据 · · ·</div>';
      area.offsetHeight;area.classList.add('visible');
    },870);
  }else{
    /* 后续搜索：立即更新位置并显示 */
    _updateResultsTop();
    area.classList.remove('visible');
    area.innerHTML='<div class="search-loading">正在搜索全站数据 · · ·</div>';
    area.offsetHeight;area.classList.add('visible');
  }

  loadData(function(){pendingRes=runSearch(term);dataReady=true;tryShow();});
  setTimeout(function(){timerReady=true;tryShow();},minMs);
}

/* 键盘上下选择结果卡片 + 回车打开选中项(无选中则发起搜索) */
var _kbIdx=-1;
function _cards(){return document.querySelectorAll('#results-area .result-card');}
function _setKb(i){
  var cs=_cards();if(!cs.length)return;
  if(_kbIdx>=0&&cs[_kbIdx])cs[_kbIdx].classList.remove('kbsel');
  _kbIdx=(i+cs.length)%cs.length;
  cs[_kbIdx].classList.add('kbsel');
  cs[_kbIdx].scrollIntoView({block:'nearest'});
}
document.getElementById('search-btn').addEventListener('click',function(){doSearch();});
inp.addEventListener('keydown',function(e){
  var cs=_cards();
  if((e.key==='ArrowDown'||e.key==='ArrowUp')&&cs.length){
    e.preventDefault();_setKb(_kbIdx+(e.key==='ArrowDown'?1:-1));return;
  }
  if(e.key==='Enter'){
    if(_kbIdx>=0&&cs[_kbIdx]){e.preventDefault();playExitCollapse(cs[_kbIdx].dataset.dest);return;}
    doSearch();
  }
});

/* 支持 item.html 等页面用 ?q=xxx 跳转过来直接检索(两搜索打通的回链入口) */
(function(){
  var m=location.search.match(/[?&]q=([^&]*)/);
  if(!m)return;
  var q=decodeURIComponent(m[1].replace(/\+/g,' '));
  if(!q)return;
  function go(){inp.value=q;doSearch();}
  if(document.readyState==='complete')setTimeout(go,150);
  else window.addEventListener('load',function(){setTimeout(go,150);});
})();
</script>
