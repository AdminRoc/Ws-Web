# 本文件仅在使用 wrangler CLI 部署时需要。
# 如果走 Cloudflare Dashboard 纯网页操作（推荐），不需要这个文件，
# Cron Trigger 直接在网页的 Settings → Triggers 里手动添加即可。
name = "wfspeed-worldstate-trigger"
main = "worker.js"
compatibility_date = "2025-01-01"

[triggers]
# 每10分钟触发一次（每小时第 1/11/21/31/41/51 分钟）。
# 用 "第1分钟起步" 而不是 "*/10"（0/10/20...），是为了让 00:01 UTC
# （北京时间 08:01）天然落在触发点上，仍满足"早八01必触发"的要求。
crons = ["1,11,21,31,41,51 * * * *"]
