name: 补齐物品检索缺失缩略图(从wiki.warframe.com抓取)

# item.html 的可搜索集合 = data/wm-items.json(WM交易目录，自带图标) ∪
# data/drops-index.json(掉落表反查，含大量WM不交易的资源/蓝图，没有图标)。
# 后者里"只在掉落表、不在WM目录"的条目本来就没有官方图标URL可用。
# wiki.warframe.com 是独立 MediaWiki 站(非 Fandom)，带标准 api.php，
# pageimages 属性能直接拿到条目缩略图，用来补齐这部分空白。
# 输出 data/wiki-icon-harvest.json，是纯"原始物品名 -> wiki缩略图URL"映射，
# 不涉及任何译名/人工审核，可以直接提交生效(与 calamity-i18n 候选词那条
# 需要人工确认译名准确性的流程不同，这里只是客观存在的图片URL，无歧义)。
#
# 抓取脚本在私库 AdminRoc/Ws-Web-core(.github/scripts 整体 gitignore 在公库里，
# 与 harvest-calamity-i18n.yml 同一约定)；运行前 checkout 私库覆盖进工作树，
# 只把结果文件提交回公库，私库脚本绝不提交回公库。
on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 1'   # 每周一补一次，wm-items.json/drops-index.json 也是周期性更新

concurrency:
  group: ws-web-batch-lock   # 低频批处理任务共用一把锁，与高频世界状态管线（fastlane）分开，互不阻塞
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout 公库
        uses: actions/checkout@v5

      - name: 拉取私库(挖掘脚本)
        uses: actions/checkout@v5
        with:
          repository: AdminRoc/Ws-Web-core
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          path: _private

      - name: 覆盖私库脚本进工作树(不会被提交回公库)
        run: |
          mkdir -p .github/scripts
          cp -a _private/.github/scripts/harvest_wiki_icons.py .github/scripts/
          rm -rf _private

      - name: 抓取wiki缩略图补全缺失图标
        run: python3 .github/scripts/harvest_wiki_icons.py

      - name: 提交并推送(只提交结果文件,无变化时跳过)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/wiki-icon-harvest.json
          git diff --staged --quiet && { echo "无实质变动,跳过提交"; exit 0; }
          git commit -m "data: refresh wiki icon harvest [skip ci]"
          for i in 1 2 3 4 5; do
            if git push; then echo "推送成功(第 $i 次)"; exit 0; fi
            echo "推送被拒(第 $i 次),拉取远端后 rebase 重试..."
            git pull --rebase --autostash origin main || true
          done
          echo "重试多次仍推送失败" >&2
          exit 1
