name: 收割掉落表物品中文译名

# item.html 的可搜索集合里，大量"掉落表专属"条目(资源/蓝图/遗物/源力石等)
# 在 drops-index.json 里 zh 字段是空的，过去只能用英文搜到。本流程从官方游戏
# 客户端本地化数据镜像 calamity-inc/warframe-public-export-plus 批量收割这些
# 条目的中文译名，写出 data/item-i18n-harvest.json，item.html 在 zh 字段为空时
# 用它兜底，跟 wiki-icon-harvest.json 的接入方式完全一致。
#
# 收割脚本在私库 AdminRoc/Ws-Web-core(.github/scripts 整体 gitignore，与
# harvest-calamity-i18n.yml / harvest-wiki-icons.yml / cache-item-icons.yml
# 同一约定)；运行前 checkout 私库覆盖进工作树，只把收割出的数据文件提交回公库，
# 私库脚本绝不提交回公库。
on:
  workflow_dispatch:
  schedule:
    - cron: '22 5 * * 1'   # 每周一，错开同仓库其他定时任务各自的刷新时间点

concurrency:
  group: harvest-item-i18n
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout 公库
        uses: actions/checkout@v5

      - name: 拉取私库(收割脚本)
        uses: actions/checkout@v5
        with:
          repository: AdminRoc/Ws-Web-core
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          path: _private

      - name: 覆盖私库脚本进工作树(不会被提交回公库)
        run: |
          mkdir -p .github/scripts
          cp -a _private/.github/scripts/harvest_item_i18n.py .github/scripts/
          rm -rf _private

      - name: 收割中文译名
        run: python3 .github/scripts/harvest_item_i18n.py

      - name: 提交并推送(无变化时跳过)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/item-i18n-harvest.json
          git diff --staged --quiet && { echo "无实质变动,跳过提交"; exit 0; }
          git commit -m "data: refresh item i18n harvest [skip ci]"
          for i in 1 2 3 4 5; do
            if git push; then echo "推送成功(第 $i 次)"; exit 0; fi
            echo "推送被拒(第 $i 次),拉取远端后 rebase 重试..."
            git pull --rebase --autostash origin main || true
          done
          echo "重试多次仍推送失败" >&2
          exit 1
