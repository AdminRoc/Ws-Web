name: 镜像世界状态(辅助源)

# 把一个辅助世界状态接口(server=intl/cn × lang=zh/en)镜像成同源静态 JSON,
# 交给腾讯云 CDN 分发,供前端按"国服/国际服 + 中/英"切换读取。
# 抓取脚本 build_aux_state.py 在私库 AdminRoc/Ws-Web-core;运行前 checkout 私库覆盖进
# 工作树,产物(4 个 ws-*.json)提交回公库,私库脚本绝不提交回公库。
#
# 定时触发由 Cloudflare Workers Cron Triggers 负责(每 2 分钟;见私库 cloudflare-worker/),
# 弥补 GitHub 自带 schedule 对不活跃仓库的延迟/跳过。
# 脚本内做"忽略时间戳噪声"的变化检测,世界状态无实质变动时不产生提交,避免历史膨胀。
on:
  workflow_dispatch:

concurrency:
  group: mirror-aux-state
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout 公库
        uses: actions/checkout@v5

      - name: 拉取私库(抓取脚本)
        uses: actions/checkout@v5
        with:
          repository: AdminRoc/Ws-Web-core
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          path: _private

      - name: 覆盖私库脚本进工作树(不会被提交回公库)
        run: |
          mkdir -p .github/scripts
          cp -a _private/.github/scripts/. .github/scripts/
          rm -rf _private

      - name: 镜像世界状态(4 组合)
        run: python3 .github/scripts/build_aux_state.py

      - name: 提交并推送(只提交产物,无变化时跳过)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ws-intl-zh.json data/ws-intl-en.json data/ws-cn-zh.json data/ws-cn-en.json
          git diff --staged --quiet && { echo "无实质变动,跳过提交"; exit 0; }
          git commit -m "data: update aux-state [skip ci]"
          # 多个定时工作流(本工作流 + 更新世界状态全量数据 等)各自按 cron 推送同一 main 分支,
          # concurrency 只能串行"同名"工作流,跨工作流仍会撞车导致 push 被拒(non-fast-forward)。
          # 这里 fetch + rebase + 重试自愈,避免偶发推送失败。产物提交带 [skip ci] 不会触发额外构建。
          for i in 1 2 3 4 5; do
            if git push; then echo "推送成功(第 $i 次)"; exit 0; fi
            echo "推送被拒(第 $i 次),拉取远端后 rebase 重试..."
            git pull --rebase --autostash origin main || true
          done
          echo "重试多次仍推送失败" >&2
          exit 1
