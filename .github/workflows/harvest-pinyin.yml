name: 生成拼音检索表

# item.html / search.html 的"拼音检索"用一份自托管的汉字->拼音小表
# data/pinyin-map.json(运行时只读，零外部依赖，大陆访问友好)。本流程用 pypinyin
# 离线把"物品名/榜单名里实际出现过的汉字"逐字转成无声调读音(含多音字)，写出该表；
# 新词进来时周期性重跑补全。接入方式与 harvest-item-i18n.yml 完全一致。
#
# 生成脚本在私库 AdminRoc/Ws-Web-core(.github/scripts 整体 gitignore，与
# harvest-item-i18n.yml / cache-item-icons.yml 同一约定)；运行前 checkout 私库
# 覆盖进工作树，只把生成的数据文件提交回公库，私库脚本绝不提交回公库。
on:
  workflow_dispatch:
  schedule:
    - cron: '42 5 * * 1'   # 每周一，错开同仓库其他定时任务各自的刷新时间点

concurrency:
  group: ws-web-git-push-lock   # 所有会 git push main 的工作流共用同一把锁，串行执行，杜绝互相撞车
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout 公库
        uses: actions/checkout@v5

      - name: 拉取私库(生成脚本)
        uses: actions/checkout@v5
        with:
          repository: AdminRoc/Ws-Web-core
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          path: _private

      - name: 覆盖私库脚本进工作树(不会被提交回公库)
        run: |
          mkdir -p .github/scripts
          cp -a _private/.github/scripts/harvest_pinyin.py .github/scripts/
          rm -rf _private

      - name: 安装 pypinyin
        run: pip install pypinyin

      - name: 生成拼音表
        run: python3 .github/scripts/harvest_pinyin.py

      - name: 提交并推送(无变化时跳过)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pinyin-map.json
          git diff --staged --quiet && { echo "无实质变动,跳过提交"; exit 0; }
          git commit -m "data: refresh pinyin map [skip ci]"
          for i in 1 2 3 4 5; do
            if git push; then echo "推送成功(第 $i 次)"; exit 0; fi
            echo "推送被拒(第 $i 次),拉取远端后 rebase 重试..."
            git pull --rebase --autostash origin main || true
          done
          echo "重试多次仍推送失败" >&2
          exit 1
