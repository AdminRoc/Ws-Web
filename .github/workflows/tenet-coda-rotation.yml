name: 信条/终幕武器轮换校准

# 信条(Tenet)/终幕(Coda)武器每次轮换的元素+加成百分比是游戏内随机生成的，没有任何
# 官方/社区API能查询，只能靠社区在 Google Sheets 上记录实测结果。Google 服务在中国
# 大陆不稳定，不能让用户浏览器直连，所以改为本工作流定时在 GitHub 服务器上抓取一次，
# 写入 data/tenet-coda-rotation.json，worldstate.html 读取这份同源文件。
#
# 抓取脚本 fetch_tenet_coda.py 已迁私库 AdminRoc/Ws-Web-core：运行前 checkout 私库覆盖
# 进工作树；产物 json 提交回公库，私库脚本绝不提交回公库。
on:
  # 定时触发已迁移至 Cloudflare Workers Cron Triggers（见私库 cloudflare-worker/）。
  workflow_dispatch:

concurrency:
  group: tenet-coda-rotation
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout 公库
        uses: actions/checkout@v5

      - name: 拉取私库（后端脚本）
        uses: actions/checkout@v5
        with:
          repository: AdminRoc/Ws-Web-core
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          path: _private

      - name: 覆盖私库脚本进工作树（不会被提交回公库）
        run: |
          mkdir -p .github/scripts
          cp -a _private/.github/scripts/. .github/scripts/
          rm -rf _private

      - name: 抓取信条/终幕轮换数据
        run: python3 .github/scripts/fetch_tenet_coda.py

      - name: 提交并推送（只提交产物，无变化时跳过）
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tenet-coda-rotation.json
          git diff --staged --quiet && { echo "无实质变动,跳过提交"; exit 0; }
          git commit -m "data: update tenet-coda-rotation [skip ci]"
          # 跨工作流并发推送同一 main 会撞车(non-fast-forward),fetch+rebase+重试自愈
          for i in 1 2 3 4 5; do
            if git push; then echo "推送成功(第 $i 次)"; exit 0; fi
            echo "推送被拒(第 $i 次),拉取远端后 rebase 重试..."
            git pull --rebase --autostash origin main || true
          done
          echo "重试多次仍推送失败" >&2; exit 1
