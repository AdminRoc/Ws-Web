name: 信条/终幕武器轮换校准

# 信条(Tenet)/终幕(Coda)武器每次轮换的元素+加成百分比是游戏内随机生成的，没有任何
# 官方/社区API能查询，只能靠社区在 Google Sheets 上记录实测结果。Google 服务在中国
# 大陆不稳定，不能让用户浏览器直连，所以改为本工作流每小时在 GitHub 服务器上抓取一次，
# 写入 data/tenet-coda-rotation.json，worldstate.html 读取这份同源文件。
on:
  # 定时触发已迁移至 Cloudflare Workers Cron Triggers（见 cloudflare-worker/），
  # 跟 worldstate-cycles.yml 同一套理由：比 GitHub 自带的 schedule 更可靠，
  # 不会因为仓库不活跃被 GitHub 自动跳过/延迟。
  workflow_dispatch:

concurrency:
  group: tenet-coda-rotation
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: 抓取信条/终幕轮换数据
        run: python3 .github/scripts/fetch_tenet_coda.py

      - name: 提交并推送（无变化时跳过）
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tenet-coda-rotation.json
          git diff --staged --quiet || \
            git commit -m "data: update tenet-coda-rotation [skip ci]"
          git push
