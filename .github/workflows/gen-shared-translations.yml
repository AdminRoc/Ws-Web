name: 生成共享翻译产物

# 通用汉化主源 data/wf-translations.json 已迁私库 AdminRoc/Ws-Web-core，由它派生两个公库产物：
#   js/wf-translations.js   （worldstate + eelog 前端直接 <script> 加载）
#   log/js/solNodes.js      （eelog 节点名映射，含 WFCD 节点数据）
# 生成脚本 gen_wf_translations.py / gen_solnodes.py 也在私库。本工作流 checkout 私库覆盖后
# 在公库工作树里运行它们（此时输出路径 js/、log/js/ 才正确），只把这两个产物提交回公库。
#
# 何时触发：① 改了私库 data/wf-translations.json 后手动 Run；
#           ② （可选）由 Cloudflare 定时触发，让 solNodes.js 跟随游戏新增节点保持新鲜。
on:
  workflow_dispatch:

concurrency:
  group: gen-shared-translations
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout 公库
        uses: actions/checkout@v5

      - name: 拉取私库（脚本 + 通用汉化源）
        uses: actions/checkout@v5
        with:
          repository: AdminRoc/Ws-Web-core
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          path: _private

      - name: 覆盖私库脚本与源进工作树（不会被提交回公库）
        run: |
          mkdir -p .github/scripts data
          cp -a _private/.github/scripts/. .github/scripts/
          cp -a _private/data/. data/
          rm -rf _private

      - name: 生成 js/wf-translations.js
        run: python3 .github/scripts/gen_wf_translations.py

      - name: 生成 log/js/solNodes.js
        run: python3 .github/scripts/gen_solnodes.py

      - name: 提交并推送（只提交这两个产物，无变化时跳过）
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/wf-translations.js log/js/solNodes.js
          git diff --staged --quiet || \
            git commit -m "build: regenerate shared translation products [skip ci]"
          git push
