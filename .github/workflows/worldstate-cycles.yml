name: 更新世界状态全量数据

on:
  schedule:
    - cron: '*/5 * * * *'   # 每 5 分钟执行一次
  workflow_dispatch:          # 支持手动触发

jobs:
  update-worldstate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: 拉取完整世界状态数据并生成 JSON
        run: |
          mkdir -p data

          # 一次请求获取所有数据，比分别请求 16 个端点更高效
          # language=zh 确保中文本地化字段（任务名等）正确返回
          response=$(curl -sf --max-time 30 \
            "https://api.warframestat.us/pc?language=zh" || echo "null")

          if [ "$response" = "null" ]; then
            echo "API 请求失败，跳过本次更新"
            exit 0
          fi

          # 提取所有 16 个键，fetchedAt 记录本次拉取时刻（UTC）
          # 各时间戳均为 DE 服务器下发的绝对 UTC 值，与拉取时刻无关，不会引起误差
          echo "$response" | jq \
            --arg fetchedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              fetchedAt:    $fetchedAt,
              cetusCycle:   .cetusCycle,
              vallisCycle:  .vallisCycle,
              cambionCycle: .cambionCycle,
              zarimanCycle: .zarimanCycle,
              duviriCycle:  .duviriCycle,
              fissures:     .fissures,
              sortie:       .sortie,
              archonHunt:   .archonHunt,
              nightwave:    .nightwave,
              steelPath:    .steelPath,
              voidTrader:   .voidTrader,
              invasions:    .invasions,
              syndicates:   .syndicates,
              dailyDeals:   .dailyDeals,
              tenetWeapons: .tenetWeapons,
              codaWeapons:  .codaWeapons
            }' > data/worldstate-all.json

      - name: 补充物品中文名称字典（查询汇集 Wiki API）
        run: |
          python3 - <<'PYEOF'
import json, re, time, urllib.parse, urllib.request

def has_chinese(s):
    return bool(re.search(r'[一-鿿]', s))

def wiki_lookup(name):
    url = ('https://warframe.huijiwiki.com/api.php?action=query'
           '&list=search&srsearch=' + urllib.parse.quote(name) +
           '&srnamespace=0&srlimit=1&format=json')
    try:
        req = urllib.request.Request(url, headers={'User-Agent': 'WsWeb-bot/1.0'})
        with urllib.request.urlopen(req, timeout=10) as r:
            data = json.loads(r.read())
        results = data.get('query', {}).get('search', [])
        if results:
            title = results[0]['title']
            if title != name and has_chinese(title):
                return title
    except Exception as e:
        print(f'  查询失败: {e}')
    return None

try:
    with open('data/item-names-zh.json', encoding='utf-8') as f:
        translations = json.load(f)
except Exception:
    translations = {}

try:
    with open('data/worldstate-all.json', encoding='utf-8') as f:
        ws = json.load(f)
except Exception:
    print('worldstate-all.json 不存在，跳过')
    exit(0)

names = set()
for deal in (ws.get('dailyDeals') or []):
    if deal.get('item'):
        names.add(deal['item'])
sp = ws.get('steelPath') or {}
if sp.get('currentReward', {}).get('name'):
    names.add(sp['currentReward']['name'])
for item in (sp.get('evergreens') or []):
    if item.get('name'):
        names.add(item['name'])

new_count = 0
for name in sorted(names):
    if name in translations:
        continue
    zh = wiki_lookup(name)
    if zh:
        translations[name] = zh
        print(f'  {name} -> {zh}')
        new_count += 1
    time.sleep(0.5)

with open('data/item-names-zh.json', 'w', encoding='utf-8') as f:
    json.dump(translations, f, ensure_ascii=False, indent=2)

print(f'完成，本次新增 {new_count} 条翻译，共 {len(translations)} 条')
PYEOF

      - name: 提交并推送（无变化时跳过）
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/worldstate-all.json data/item-names-zh.json
          git diff --staged --quiet || \
            git commit -m "data: update worldstate-all [skip ci]"
          git push
