name: 更新世界状态全量数据

on:
  # 定时触发已迁移至 Cloudflare Workers Cron Triggers（见私库 cloudflare-worker/），
  # 每5分钟调用一次本工作流的 workflow_dispatch，比 GitHub 自带的 schedule 更可靠。
  workflow_dispatch:          # 支持手动 / 外部触发

# 触发频率提高后，若上一次运行（含 git push）还没结束就被下一次触发，
# 排队而非并行执行，避免两个运行同时 git push 导致冲突。
concurrency:
  group: worldstate-update
  cancel-in-progress: false

jobs:
  update-worldstate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout 公库
        uses: actions/checkout@v5

      # 拉取/组装逻辑（拉哪个端点、抽哪些字段、快照怎么生成）已抽入私库脚本
      # build_worldstate.py，本工作流仅 checkout 私库覆盖后调用，产物提交回公库。
      - name: 拉取私库（后端脚本）
        uses: actions/checkout@v5
        with:
          repository: AdminRoc/Ws-Web-core
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          path: _private

      - name: 覆盖私库脚本进工作树（不会被提交回公库）
        run: |
          mkdir -p .github/scripts
          cp -a _private/.github/scripts/. .github/scripts/
          rm -rf _private

      - name: 拉取并组装世界状态全量数据 + 同源快照
        run: python3 .github/scripts/build_worldstate.py

      - name: 补充物品中文名称字典（查询汇集 Wiki API）
        run: python3 .github/scripts/lookup_names.py

      - name: 提交并推送（只提交产物，无变化时跳过）
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 只 add 产物：私库脚本不会被提交回公库
          git add data/worldstate-all.json data/worldstate-snapshot.js data/item-names-zh.json
          git diff --staged --quiet || \
            git commit -m "data: update worldstate-all [skip ci]"
          git push
