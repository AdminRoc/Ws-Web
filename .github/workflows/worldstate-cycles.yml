name: 更新世界状态全量数据

on:
  # 定时触发已迁移至 Cloudflare Workers Cron Triggers（见 cloudflare-worker/），
  # 每5分钟调用一次本工作流的 workflow_dispatch，比 GitHub 自带的 schedule 更可靠。
  workflow_dispatch:          # 支持手动 / 外部触发

# 触发频率提高后，若上一次运行（含 git push）还没结束就被下一次触发，
# 排队而非并行执行，避免两个运行同时 git push 导致冲突。
concurrency:
  group: worldstate-update
  cancel-in-progress: false

jobs:
  update-worldstate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: 拉取完整世界状态数据并生成 JSON
        run: |
          mkdir -p data

          # 一次请求获取所有数据，比分别请求 16 个端点更高效
          # language=zh 确保中文本地化字段（任务名等）正确返回
          response=$(curl -sf --max-time 30 \
            "https://api.warframestat.us/pc?language=zh" || echo "null")

          if [ "$response" = "null" ]; then
            echo "API 请求失败，跳过本次更新"
            exit 0
          fi

          # 提取所有 16 个键，fetchedAt 记录本次拉取时刻（UTC）
          # 各时间戳均为 DE 服务器下发的绝对 UTC 值，与拉取时刻无关，不会引起误差
          echo "$response" | jq \
            --arg fetchedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              fetchedAt:    $fetchedAt,
              cetusCycle:   .cetusCycle,
              vallisCycle:  .vallisCycle,
              cambionCycle: .cambionCycle,
              zarimanCycle: .zarimanCycle,
              duviriCycle:  .duviriCycle,
              fissures:     .fissures,
              alerts:       .alerts,
              sortie:       .sortie,
              archonHunt:   .archonHunt,
              nightwave:    .nightwave,
              steelPath:    .steelPath,
              voidTrader:   .voidTrader,
              vaultTrader:  .vaultTrader,
              invasions:    .invasions,
              syndicates:   .syndicates,
              syndicateMissions: .syndicateMissions,
              dailyDeals:   .dailyDeals,
              tenetWeapons: .tenetWeapons,
              codaWeapons:  .codaWeapons
            }' > data/worldstate-all.json

      - name: 补充物品中文名称字典（查询汇集 Wiki API）
        run: python3 .github/scripts/lookup_names.py

      - name: 生成可直接 <script> 内嵌的快照（零网络兜底，不需要任何 fetch）
        run: |
          {
            echo "/* 由 worldstate-cycles workflow 自动生成，请勿手动编辑。"
            echo "   与本目录下的 worldstate-all.json 内容完全一致，唯一区别是"
            echo "   这份是可以直接被 <script> 标签加载执行的 JS，不需要任何网络请求"
            echo "   就能拿到数据——哪怕 api.warframestat.us 和所有镜像都连不上，"
            echo "   甚至哪怕是用 file:// 协议本地打开页面，这份数据依然可用。 */"
            printf 'window.WF_WS_SNAPSHOT = '
            cat data/worldstate-all.json
            printf ';\n'
          } > data/worldstate-snapshot.js

      - name: 提交并推送（无变化时跳过）
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/worldstate-all.json data/worldstate-snapshot.js data/item-names-zh.json
          git diff --staged --quiet || \
            git commit -m "data: update worldstate-all [skip ci]"
          git push
