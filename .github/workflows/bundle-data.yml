name: 打包榜单数据文件

# 触发时机：当 data/ 目录下的数据源文件被 push 时自动重建 bundle。
# 你照旧逐个编辑 data/<分类>/ 下的单个成绩文件并 push，本工作流会自动把它们
# 重新拼接成各分类的 _bundle.js（榜单页面和全站搜索实际加载的就是这些 bundle）。
#
# 生成脚本 bundle_data.py 已迁入私库 AdminRoc/Ws-Web-core：运行前先 checkout 私库、
# 覆盖进工作树；产物 _bundle.js 仍提交回本（公）库，私库脚本本身绝不提交回公库。
on:
  push:
    paths:
      - 'data/**'
  workflow_dispatch:

concurrency:
  group: bundle-data
  cancel-in-progress: false

jobs:
  rebuild-bundles:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout 公库
        uses: actions/checkout@v5

      - name: 拉取私库（后端脚本）
        uses: actions/checkout@v5
        with:
          repository: AdminRoc/Ws-Web-core
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          path: _private

      - name: 覆盖私库脚本进工作树（这些文件不会被提交回公库）
        run: |
          mkdir -p .github/scripts
          cp -a _private/.github/scripts/. .github/scripts/
          rm -rf _private

      - name: 重建所有分类的 _bundle.js
        run: python3 .github/scripts/bundle_data.py

      - name: 提交并推送（只提交产物，无变化时跳过）
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 只 add 产物，绝不用 git add -A：防止把覆盖进来的私库脚本提交回公库
          git add data/*/_bundle.js
          git diff --staged --quiet && { echo "无实质变动,跳过提交"; exit 0; }
          git commit -m "build: rebuild data bundles [skip ci]"
          # 跨工作流并发推送同一 main 会撞车(non-fast-forward),fetch+rebase+重试自愈
          for i in 1 2 3 4 5; do
            if git push; then echo "推送成功(第 $i 次)"; exit 0; fi
            echo "推送被拒(第 $i 次),拉取远端后 rebase 重试..."
            git pull --rebase --autostash origin main || true
          done
          echo "重试多次仍推送失败" >&2; exit 1
