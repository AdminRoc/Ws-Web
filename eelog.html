<!DOCTYPE html>
<html lang="zh-CN" class="fonts-loading" data-fui-theme="cyber">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WTF EELOG — Warframe EE.log 分析器</title>
  <link rel="stylesheet" href="log/css/style.css?v=20260716a">
  <link rel="icon" href="log/picture/WS-logo-2.png">
  <!-- 加载屏所需 Logo 立即预加载（preload = 当前页高优先级） -->
  <link rel="preload" href="picture/WS-logo-2.png" as="image">
  <style>
    /* ══════════════════════════════════════════════════════
       WTF EELOG 赛博加载屏（teal 主题，区别于 player.html 的暗金风格）
    ══════════════════════════════════════════════════════ */
    #el-overlay {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: clamp(10px, 2.2vh, 22px);
      background: radial-gradient(circle at 50% 44%, #0b1218 0%, #070a0d 55%, #040608 100%);
      overflow: hidden;
    }
    #el-overlay.el-close {
      animation: elOut .75s cubic-bezier(.55,0,.85,.36) forwards;
      pointer-events: none;
    }
    @keyframes elOut {
      0%   { opacity:1; filter:blur(0) hue-rotate(0deg); }
      35%  { opacity:.85; filter:blur(2px) hue-rotate(40deg) brightness(1.15); }
      70%  { opacity:.4; filter:blur(6px) hue-rotate(90deg); }
      100% { opacity:0; filter:blur(14px) hue-rotate(140deg); }
    }
    /* 纵向数据雨列线 */
    .el-matrix {
      position: absolute; inset: 0; pointer-events: none;
      background:
        repeating-linear-gradient(90deg,
          rgba(95,208,232,.14) 0px, rgba(95,208,232,.14) 1px,
          transparent 1px, transparent 38px);
      -webkit-mask-image: radial-gradient(circle at 50% 44%, #000 0%, transparent 72%);
      mask-image: radial-gradient(circle at 50% 44%, #000 0%, transparent 72%);
    }
    /* 横向扫描光带 */
    .el-scan {
      position: absolute; left:0; right:0; height:2px; top:0; pointer-events:none;
      will-change: transform;
      background: linear-gradient(90deg, transparent 0%, rgba(95,208,232,.9) 40%, rgba(0,255,200,.6) 60%, transparent 100%);
      box-shadow: 0 0 16px rgba(95,208,232,.55), 0 0 36px rgba(95,208,232,.22);
      animation: elScan 2.6s linear infinite;
    }
    /* GPU 合成：用 transform 代替 top 动画，扫描线全程走合成层不触发重排重绘。
       容器 #el-overlay 为 position:fixed;inset:0（=视口），故 100vh 等价于原 top:100% */
    @keyframes elScan { from { transform: translateY(-2px); } to { transform: translateY(100vh); } }
    /* 核心环 + Logo */
    .el-core {
      position: relative;
      width: clamp(180px, 32vmin, 310px);
      height: clamp(180px, 32vmin, 310px);
      flex-shrink: 0;
    }
    .el-ring { position:absolute; border-radius:50%; }
    .el-ring1 {
      inset:0;
      border: 2px dashed rgba(95,208,232,.65);
      animation: elSpin 3.2s linear infinite;
      box-shadow: 0 0 22px rgba(95,208,232,.2), inset 0 0 14px rgba(95,208,232,.06);
    }
    .el-ring2 {
      inset:8%;
      border: 2px solid transparent;
      border-top-color: #5fd0e8;
      border-left-color: rgba(95,208,232,.3);
      animation: elSpin 1.9s linear infinite reverse;
    }
    .el-ring3 {
      inset:16%;
      border: 1px dotted rgba(0,255,200,.35);
      animation: elSpin 7s linear infinite;
    }
    @keyframes elSpin { to { transform:rotate(360deg); } }
    .el-logo {
      position: absolute; inset:18%; width:64%; height:64%;
      border-radius:50%; object-fit:cover;
      mix-blend-mode:screen; pointer-events:none;
      animation: elLogoPulse 2.2s ease-in-out infinite;
    }
    @keyframes elLogoPulse {
      0%,100% { filter:drop-shadow(0 0 7px rgba(95,208,232,.45)) brightness(.88); transform:scale(.95); }
      50%      { filter:drop-shadow(0 0 22px rgba(95,208,232,.85)) brightness(1.15); transform:scale(1.04); }
    }
    /* 标题：纯赛博青色 + 故障抖动（与 player.html 金→赛博双层过渡完全不同） */
    .el-title {
      font-family: 'XSZT', 'Microsoft YaHei', monospace;
      font-size: clamp(1.3rem, 4.2vmin, 2.2rem);
      letter-spacing: .48em; text-indent: .48em;
      color: #5fd0e8;
      text-shadow:
        0 0 6px rgba(95,208,232,.9),
        0 0 18px rgba(95,208,232,.5),
        0 0 38px rgba(0,255,200,.25);
      animation: elGlitch 4.5s steps(1,end) infinite;
      white-space: nowrap;
    }
    @keyframes elGlitch {
      0%,88%,100% { transform:translate(0); filter:brightness(1); }
      89%  { transform:translate(-4px,1px) skewX(-2deg); filter:brightness(1.35) hue-rotate(15deg); }
      91%  { transform:translate(4px,-1px) skewX(1.5deg); filter:brightness(.75); }
      93%  { transform:translate(-2px,0); filter:brightness(1.2); }
      95%  { transform:translate(0); clip-path:inset(30% 0 40% 0); filter:brightness(1.4); }
      96%  { clip-path:none; }
    }
    /* 副标题 */
    .el-sub {
      font-family: 'XSZT', 'Microsoft YaHei', monospace;
      font-size: clamp(.75rem, 2vmin, .95rem);
      letter-spacing: .22em;
      color: rgba(95,208,232,.48);
    }
    .el-d { display:inline-block; margin-left:.28em; animation:elDot 1.4s ease-in-out infinite; }
    .el-d:nth-child(2) { animation-delay:.2s; }
    .el-d:nth-child(3) { animation-delay:.4s; }
    @keyframes elDot {
      0%,100% { opacity:.15; transform:translateY(0); }
      50%      { opacity:1;   transform:translateY(-3px); }
    }
    /* 流光进度条 */
    .el-bar {
      width: clamp(200px, 36vmin, 340px); max-width:80vw;
      height:2px; border-radius:1px; overflow:hidden;
      background: rgba(95,208,232,.1); flex-shrink:0;
    }
    .el-bar span {
      display:block; height:100%; width:35%;
      background: linear-gradient(90deg, transparent, #5fd0e8, rgba(0,255,200,.9), transparent);
      box-shadow: 0 0 8px rgba(95,208,232,.6);
      animation: elBar 1.9s cubic-bezier(.45,.05,.55,.95) infinite;
    }
    @keyframes elBar { from{transform:translateX(-120%);} to{transform:translateX(320%);} }
    /* 状态提示 */
    .el-status {
      font-family: 'XSZT', 'Microsoft YaHei', monospace;
      font-size: clamp(.65rem, 1.7vmin, .82rem);
      letter-spacing: .14em;
      color: rgba(95,208,232,.3);
      animation: elBlink 2.2s ease-in-out infinite;
    }
    @keyframes elBlink { 0%,100%{opacity:.25;} 50%{opacity:.65;} }
    /* 横屏矮视口适配 */
    @media (max-height:520px) {
      .el-core { width:clamp(120px,22vmin,190px); height:clamp(120px,22vmin,190px); }
      #el-overlay { gap:clamp(6px,1.4vh,14px); }
    }

    /* ══════════════════════════════════════════════════════
       字体加载前隐藏页面内容，加载完成后渐显
    ══════════════════════════════════════════════════════ */
    html.fonts-loading .home-hero { opacity:0; }

    html.fonts-loaded .home-hero {
      opacity:1;
      transition: opacity .55s ease .15s;
    }

    /* 顶栏已移除：取消全局样式为固定顶栏预留的 72px 顶部内边距 */
    body { padding-top: 0 !important; }

    /* ══════════════════════════════════════════════════════
       朦胧彩色辉光背景
       四团柔和辉光沿各自的闭合椭圆轨道缓慢漂浮：
       - 轨道首尾闭合（0% 与 100% 完全一致），运动连续无跳变；
       - 缩放/透明度随轨道同步呼吸，无生硬的方向转折；
       - 21s/27s/17s/13s 四个互质周期错相叠加，整体长时间
         不重复，screen 混合叠在深色底上，朦胧而通透。
    ══════════════════════════════════════════════════════ */
    .hero-aurora {
      position: absolute; pointer-events: none; z-index: 1;
      border-radius: 50%;
      mix-blend-mode: screen;
      will-change: transform, opacity;
    }
    /* 青 · 左上，主氛围光 */
    .hero-aurora.a1 {
      width: 62vmax; height: 62vmax; top: -18%; left: -12%;
      background: radial-gradient(closest-side,
        rgba(95,208,232,.16), rgba(95,208,232,.05) 45%, transparent 72%);
      filter: blur(48px);
      animation: glowOrbitA 21s linear infinite;
    }
    /* 紫→品红 · 右下，与青色交叠出层次 */
    .hero-aurora.a2 {
      width: 58vmax; height: 58vmax; bottom: -22%; right: -10%;
      background: radial-gradient(closest-side,
        rgba(168,107,255,.15), rgba(217,70,239,.05) 45%, transparent 72%);
      filter: blur(54px);
      animation: glowOrbitB 27s linear infinite;
      animation-delay: -9s;
    }
    /* 蓝绿 · 中部偏右，提亮画面中腹 */
    .hero-aurora.a3 {
      width: 44vmax; height: 44vmax; top: 22%; left: 52%;
      background: radial-gradient(closest-side,
        rgba(69,200,255,.13), rgba(65,255,142,.05) 45%, transparent 72%);
      filter: blur(44px);
      animation: glowOrbitC 17s ease-in-out infinite;
      animation-delay: -5s;
    }
    /* 粉金 · 右上小光团，灵动点缀 */
    .hero-aurora.a4 {
      width: 32vmax; height: 32vmax; top: -6%; right: 18%;
      background: radial-gradient(closest-side,
        rgba(255,95,192,.12), rgba(255,154,61,.04) 45%, transparent 72%);
      filter: blur(38px);
      animation: glowOrbitD 13s ease-in-out infinite;
      animation-delay: -3s;
    }
    /* A/B：八段式闭合椭圆轨道，linear 匀速，平滑无拐点的永续漂浮 */
    @keyframes glowOrbitA {
      0%    { transform: translate(0%, 0%) scale(1);      opacity: .70; }
      12.5% { transform: translate(9%, 5%) scale(1.07);  opacity: .78; }
      25%   { transform: translate(14%, 9%) scale(1.12); opacity: .85; }
      37.5% { transform: translate(12%, 14%) scale(1.08);opacity: .78; }
      50%   { transform: translate(0%, 16%) scale(1.02); opacity: .70; }
      62.5% { transform: translate(-11%, 12%) scale(.96);opacity: .62; }
      75%   { transform: translate(-15%, 7%) scale(.93); opacity: .58; }
      87.5% { transform: translate(-9%, 3%) scale(.97);  opacity: .64; }
      100%  { transform: translate(0%, 0%) scale(1);     opacity: .70; }
    }
    @keyframes glowOrbitB {
      0%    { transform: translate(0%, 0%) scale(1);      opacity: .66; }
      12.5% { transform: translate(-10%, -5%) scale(1.06);opacity: .74; }
      25%   { transform: translate(-15%, -9%) scale(1.1); opacity: .80; }
      37.5% { transform: translate(-12%, -14%) scale(1.05);opacity: .73; }
      50%   { transform: translate(0%, -16%) scale(1);    opacity: .66; }
      62.5% { transform: translate(11%, -12%) scale(.95); opacity: .60; }
      75%   { transform: translate(15%, -7%) scale(.93);  opacity: .56; }
      87.5% { transform: translate(9%, -3%) scale(.97);   opacity: .61; }
      100%  { transform: translate(0%, 0%) scale(1);      opacity: .66; }
    }
    /* C/D：五段式呼吸漂浮，ease-in-out 在途经点自然减速，像浮游生物 */
    @keyframes glowOrbitC {
      0%   { transform: translate(0%, 0%) scale(1);      opacity: .60; }
      25%  { transform: translate(-12%, 8%) scale(1.1);  opacity: .72; }
      50%  { transform: translate(2%, 15%) scale(1.04);  opacity: .64; }
      75%  { transform: translate(11%, -6%) scale(.94);  opacity: .54; }
      100% { transform: translate(0%, 0%) scale(1);      opacity: .60; }
    }
    @keyframes glowOrbitD {
      0%   { transform: translate(0%, 0%) scale(1);      opacity: .55; }
      25%  { transform: translate(10%, 12%) scale(1.12); opacity: .68; }
      50%  { transform: translate(-8%, 18%) scale(1.02); opacity: .58; }
      75%  { transform: translate(-14%, 4%) scale(.92);  opacity: .48; }
      100% { transform: translate(0%, 0%) scale(1);      opacity: .55; }
    }

    /* 减少动画时禁用辉光效果 */
    @media (prefers-reduced-motion: reduce) {
      .hero-aurora {
        display: none;
      }
    }
  </style>
  <link rel="stylesheet" href="css/fui-core.css">
</head>
<body>

<!-- ── WTF EELOG 赛博加载屏 ── -->
<div id="el-overlay" aria-hidden="true">
  <div class="el-matrix"></div>
  <div class="el-scan"></div>
  <div class="el-core">
    <div class="el-ring el-ring1"></div>
    <div class="el-ring el-ring2"></div>
    <div class="el-ring el-ring3"></div>
    <img class="el-logo" src="picture/WS-logo-2.png" alt="WS">
  </div>
  <div class="el-title">WTF&nbsp;EELOG</div>
  <div class="el-sub">EE.LOG&nbsp;ANALYZER<span class="el-d">·</span><span class="el-d">·</span><span class="el-d">·</span></div>
  <div class="el-bar"><span></span></div>
  <div class="el-status">正在初始化解析引擎</div>
</div>

  <section class="home-hero">
    <div class="hero-scan"></div>
    <div class="hero-aurora a1"></div>
    <div class="hero-aurora a2"></div>
    <div class="hero-aurora a3"></div>
    <div class="hero-aurora a4"></div>
    <div class="hero-content">
      <div class="hero-top-group">
        <div class="hero-eyebrow">WARFRAME ／ EE.LOG ANALYZER</div>
        <h1 class="hero-title">WTF&nbsp;EELOG</h1>
      </div>
      <p class="hero-desc">所有任务类型的日志皆可解析<br>在毫厘之间，享受进步的快感</p>
      <div class="hero-cta-hub" id="heroCtaHub">
        <button class="hero-cta-master" id="heroCtaMaster" type="button" aria-haspopup="true" aria-expanded="false">
          <span class="cta-text">开始分析</span>
          <span class="cta-arrow">→</span>
        </button>
        <a href="log/analyzer.html?tab=disruption" class="hero-cta-satellite sat-tl" data-label="中断" data-dir="tl">
          <span class="sat-label">中断</span>
        </a>
        <a href="log/analyzer.html?tab=eidolon" class="hero-cta-satellite sat-tr" data-label="夜灵" data-dir="tr">
          <span class="sat-label">夜灵</span>
        </a>
        <a href="log/analyzer.html?tab=profile" class="hero-cta-satellite sat-b" data-label="个人资料" data-dir="b">
          <span class="sat-label">个人资料</span>
        </a>
        <a href="log/analyzer.html?tab=profitTaker" class="hero-cta-satellite sat-bl2" data-label="蜘蛛" data-dir="bl2">
          <span class="sat-label">蜘蛛</span>
        </a>
        <a href="log/analyzer.html?tab=arbitration" class="hero-cta-satellite sat-br2" data-label="仲裁" data-dir="br2">
          <span class="sat-label">仲裁</span>
        </a>
      </div>
    </div>
  </section>

  <script src="log/js/cursor.js?v=20260715a"></script>

  <script>
  (function() {
    'use strict';
    var hub = document.getElementById('heroCtaHub');
    var master = document.getElementById('heroCtaMaster');
    var satellites = [].slice.call(hub.querySelectorAll('.hero-cta-satellite'));
    var expanded = false;
    var navigating = false;

    function expand() {
      if (expanded) return;
      expanded = true;
      master.setAttribute('aria-expanded', 'true');
      hub.classList.add('expanded');
    }

    function collapse() {
      if (!expanded || navigating) return;
      expanded = false;
      master.setAttribute('aria-expanded', 'false');
      hub.classList.remove('expanded');
    }

    master.addEventListener('mouseenter', expand);
    master.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      if (expanded) collapse(); else expand();
    });

    // 点击页面空白处收回
    document.addEventListener('click', function(e) {
      if (expanded && !hub.contains(e.target)) {
        collapse();
      }
    });

    satellites.forEach(function(sat) {
      sat.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        if (navigating) return;
        navigating = true;

        var url = sat.getAttribute('href');
        sat.classList.add('clicked');

        // 先让 clicked 状态渲染一帧，再启动全页 glitch 跳转
        requestAnimationFrame(function() {
          document.body.style.transition = 'filter .12s, opacity .12s';
          document.body.style.filter = 'hue-rotate(90deg) saturate(5) brightness(2)';
          document.body.style.opacity = '0.85';
          setTimeout(function() {
            document.body.style.filter = 'hue-rotate(200deg) contrast(4) invert(0.35)';
            document.body.style.opacity = '0.45';
          }, 140);
          setTimeout(function() {
            document.body.style.filter = 'hue-rotate(290deg) saturate(8) brightness(3)';
            document.body.style.opacity = '0.2';
          }, 320);
          setTimeout(function() {
            window.location.href = url;
          }, 520);
        });
      });
    });
  })();
  </script>

  <!-- ── 字体加载完成后关闭加载屏，触发页面渐显 ── -->
  <script>
  (function() {
    'use strict';
    var _html    = document.documentElement;
    var _overlay = document.getElementById('el-overlay');
    var _t0      = Date.now();
    var MIN_MS   = 900; /* 加载屏最短展示时长，避免一闪而过 */

    var CLOSE_MS = 750; /* 与 @keyframes elOut 时长一致 */

    function _dismiss() {
      var wait = Math.max(0, MIN_MS - (Date.now() - _t0));
      setTimeout(function() {
        /* 第一步：触发 overlay 关闭动画 */
        if (_overlay) _overlay.classList.add('el-close');

        /* 第二步：等 overlay 完全消失后，再渐显页面内容 */
        setTimeout(function() {
          _html.classList.remove('fonts-loading');
          _html.classList.add('fonts-loaded');
          /* 第三步：内容渐显动画结束后移除 overlay DOM */
          setTimeout(function() {
            if (_overlay && _overlay.parentNode) _overlay.parentNode.removeChild(_overlay);
          }, 650);
        }, CLOSE_MS);
      }, wait);
    }

    if (document.fonts && document.fonts.load) {
      var timeout = new Promise(function(r) { setTimeout(r, 5000); });
      Promise.race([document.fonts.load('1em XSZT'), timeout])
        .then(_dismiss).catch(_dismiss);
    } else {
      setTimeout(_dismiss, MIN_MS);
    }
  })();
  </script>

</body>
</html>
