<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>别抄了自己写去</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;}
  body{
    position:relative;
    display:flex;align-items:center;justify-content:center;
    width:100vw;height:100vh;
  }

  /* 全屏剧烈闪光层：盖满整个视口，在刺眼的高对比色之间疯狂切换 */
  #flashbg{
    position:fixed;inset:0;z-index:1;
    animation:flashbg .09s steps(1) infinite;
  }
  @keyframes flashbg{
    0%   { background:#fff; }
    16%  { background:#ff0040; }
    33%  { background:#000; }
    50%  { background:#fff200; }
    66%  { background:#00eaff; }
    83%  { background:#000; }
    100% { background:#fff; }
  }

  .wrap{
    position:relative;z-index:2;
    width:100vw;height:100vh;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
  }

  /* 文字本体：用 vw/vh 双向撑满，不是"大字号"而是真正铺满整个屏幕 */
  .msg{
    font-family:'Microsoft YaHei','PingFang SC','Noto Sans SC',sans-serif;
    font-weight:900;
    font-size:min(26vw, 42vh);
    width:100vw;
    text-align:center;
    line-height:1.02;
    letter-spacing:-.01em;
    white-space:nowrap;
    background:linear-gradient(90deg,
      #ff003c,#ff8c00,#ffee00,#00ff5e,#00d4ff,#7b2fff,#ff00c8,#ff003c);
    background-size:400% 100%;
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    animation:rainbow .7s linear infinite, jolt .09s steps(1) infinite;
    text-shadow:0 0 60px rgba(255,255,255,.4);
  }
  @keyframes rainbow{
    0%{background-position:0% 50%;}
    100%{background-position:400% 50%;}
  }
  @keyframes jolt{
    0%,49%{transform:scale(1);}
    50%,100%{transform:scale(1.05) rotate(-.6deg);}
  }
</style>
</head>
<body>
  <div id="flashbg"></div>
  <div class="wrap">
    <div class="msg">别抄了</div>
    <div class="msg">自己写去</div>
  </div>
  <script>
    setTimeout(function () {
      location.replace('https://www.warframe.com/zh-hans/droptables#missionRewards');
    }, 5000);
  </script>
</body>
</html>
