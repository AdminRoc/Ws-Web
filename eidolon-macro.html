<script src="data/eidolon-macro-trio.js"></script>
<script src="data/eidolon-macro-quad.js"></script>

<script>
  /* ── Tab 数据映射 ── */
  var eidolonMacroDataMap = {
    solo: typeof eidolonMacroSoloRecords !== 'undefined' ? eidolonMacroSoloRecords : [],
    duo:  typeof eidolonMacroDuoRecords  !== 'undefined' ? eidolonMacroDuoRecords  : [],
    trio: typeof eidolonMacroTrioRecords !== 'undefined' ? eidolonMacroTrioRecords : [],
    quad: typeof eidolonMacroQuadRecords !== 'undefined' ? eidolonMacroQuadRecords : []
  };
  var currentTab = 'solo';

  document.addEventListener('DOMContentLoaded', function () {
    /* 初始渲染单人 */
    renderEidolonLeaderboard(eidolonMacroDataMap['solo'], 'lb-tbody');

    /* Tab 切换事件 */
    document.getElementById('lb-tabs').addEventListener('click', function (e) {
      var btn = e.target.closest('.lb-tab-btn');
      if (!btn) return;
      var tab = btn.getAttribute('data-tab');
      if (tab === currentTab) return;
      currentTab = tab;

      /* 更新按钮高亮 */
      document.querySelectorAll('#lb-tabs .lb-tab-btn').forEach(function (b) {
        b.classList.toggle('active', b.getAttribute('data-tab') === tab);
      });

      /* 重新渲染表格 */
      renderEidolonLeaderboard(eidolonMacroDataMap[tab], 'lb-tbody');
    });
  });
</script>
